name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Identity & Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: shreejitverma
          template: classic
          base: header, metadata, repositories
          filename: metrics.main.svg
          config_timezone: America/New_York
          plugin_languages: yes
          plugin_languages_indepth: no
          plugin_languages_details: lines, percentage
          plugin_languages_limit: 8
          plugin_languages_aliases: Jupyter Notebook:Python
          output_action: none

      - name: Download Streak Metrics
        run: |
          curl -L "https://streak-stats.demolab.com?user=shreejitverma&theme=dracula&hide_border=true&background=000000&ring=4fff67&currStreakLabel=4fff67" -o metrics.streak.svg

      - name: Coding Habits
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: shreejitverma
          template: classic
          base: ""
          filename: metrics.habits.svg
          config_timezone: America/New_York
          plugin_habits: yes
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          output_action: none

      - name: Activity Heatmap
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: shreejitverma
          template: classic
          base: ""
          filename: metrics.activity.svg
          config_timezone: America/New_York
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          output_action: none

      - name: Community & Project Metrics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: shreejitverma
          template: classic
          base: ""
          filename: metrics.advanced.svg
          config_timezone: America/New_York
          plugin_followup: yes
          plugin_followup_sections: repositories
          plugin_people: yes
          plugin_people_limit: 28
          plugin_people_types: followers, following
          output_action: none

      - name: Push to metrics branch
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          mkdir -p /tmp/metrics_output
          cp *.svg /tmp/metrics_output/
          git fetch origin metrics
          git checkout metrics
          git pull origin metrics
          cp /tmp/metrics_output/*.svg .
          git add *.svg
          git commit -m "chore: update all metrics [skip ci]" || echo "No changes to commit"
          git push origin metrics
